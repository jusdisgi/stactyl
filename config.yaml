meta:
  engine: 4.1.0
  name: stactyl
  version: 0.2
  ref: &kb_ref "stactyl v0.2"
  author: huntercook
  url: &kb_url https://github.com/jusdisgi/stactyl
  footprint: &switch_footprint "switch_pg1316s"

# =============================================================================
# stactyl flat plate — PER-COLUMN COMB (BastardKB-style). Model confirmed with
# Hunter 2026-06-22; see ../stactyl/CLAUDE.md "PCB approach".
# -----------------------------------------------------------------------------
# NOT a grid of facets. Each finger column is ONE continuous full-width strip
# (keys at row pitch; the strip flexes along the scoop in the gaps BETWEEN
# switches — no neck-down between rows). Adjacent columns are joined by a single
# serpentine neck (alternating top/bottom). Everything terminates at a rigid
# controller root (regular XIAO nRF52840 BLE + power/reset/battery/LED-switch) that folds into the
# under-keywell pocket. Outboard pinky necks off the pinky strip; the 2-key
# thumb cluster is its own strip on a serpentine tail off the root.
#
# Wiring: ~5x4 matrix (cols C0..C4, rows R0..R3) + one SOD-323 diode/key.
# Column lines run UP each strip (never cross a neck); row + RGB + 5V/GND are
# the only nets crossing the necks. RGB: one serial SK6805-1515 (EC15) chain,
# LED in each switch cutout, snaking the comb (see chain order in the PCB
# scaffold at the bottom).
#
# WHAT'S RUNNABLE HERE: the points (matrix layout: 5 finger columns + outboard
# pinky + 2 thumbs). The staggers/splays are a STARTING POINT — dial them in
# ergogen against cad/stactyl-cosmos-expert.ts + a bent test print (the necks
# absorb the residual, so this does NOT need an exact arc-length unfold).
# The OUTLINE (strip rects + necks + root) and the PCB section (footprints +
# LED chain) are scaffolded in comments at the bottom — iterate those in ergogen
# on Hunter's machine (per workspace memory, generators run there, not sandbox).
# =============================================================================

units:
  # PG1316S preset — mirrored from ../xiphos / ../LightFury.
  kx: 16
  ky: 16
  ks: 17    # column spacing (PG1316S, 17 across a row)
  kp: 17    # row spacing (key-to-key down a column strip)
  kcow: 16  # cutout width  (= stock cap; caps bottom out by design)
  kcoh: 16  # cutout height
  keycw: 16
  keych: 16

  # Trace / via (from ../LightFury)
  signal_trace_width: 0.2
  pwr_trace_width: 0.25
  gnd_trace_width: 0.25
  via_size: 0.5    # JLCPCB no-extra-charge min 0.56 (KiCad default 0.8)
  via_drill: 0.3   # JLCPCB no-extra-charge min 0.3

  # Finger column stagger — flat-plate Y offset per column. STARTING values;
  # tune so the bent comb lands on its keywell posts (necks take up the rest).
  stagger_finger_pinky: -4
  stagger_finger_ring: 3
  stagger_finger_middle: 5
  stagger_finger_index: 0
  stagger_finger_inner: -2

  # Finger column splay (deg). Keep ~0 for flat strips — the keywell's row
  # curvature is absorbed by the inter-column necks, not in-plane splay.
  splay_finger_pinky: 0
  splay_finger_ring: 0
  splay_finger_middle: 0
  splay_finger_index: 0
  splay_finger_inner: 0

  # --- comb OUTLINE knobs (tune these, re-run ergogen, view output/outlines/) ---
  strip_w: 15.5   # key-PAD width (min ~14.7 = PG1316S land).
  pad_h: 14       # key-pad height (< kp=17 so the board pinches between keys = relief).
  spine_w: 5      # narrow backbone width between keys (the in-column flex zone).
  strip_h: 52     # spine height: covers all 3 rows (2*17 + one key).
  neck_l: 15      # inter-column neck length — spans the WIDE spine-to-spine gap (~12mm).
  neck_w: 10      # inter-column neck height (tall enough to bridge a column stagger step).

points:
  zones:
    # ---- Finger field: 5 columns x 3 rows. One column = one comb strip. ----
    # Columns laid left->right (right hand): inner, index, middle, ring, pinky.
    # column_net runs UP each strip; row_net crosses the necks.
    finger:
      key:
        padding: kp
        spread: ks
      columns:
        inner:
          key:
            column_net: C4
            stagger: stagger_finger_inner
            splay: splay_finger_inner
        index:
          key:
            column_net: C3
            stagger: stagger_finger_index
            splay: splay_finger_index
        middle:
          key:
            column_net: C2
            stagger: stagger_finger_middle
            splay: splay_finger_middle
        ring:
          key:
            column_net: C1
            stagger: stagger_finger_ring
            splay: splay_finger_ring
        pinky:
          key:
            column_net: C0
            stagger: stagger_finger_pinky
            splay: splay_finger_pinky
      rows:
        bottom:
          row_net: R2
        home:
          row_net: R1
        top:
          row_net: R0

    # ---- Outboard pinky: 1 key, necks off the pinky strip (xiphos/TOTEM style).
    # Shares the pinky column wire (C0), its own matrix row R3. Rotated outward;
    # 1u (custom rounded/tri cap + clearance handled in CAD). Anchor/rotation
    # are a STARTING POINT — dial in ergogen.
    pinky_out:
      anchor:
        ref: finger_pinky_home
        shift: [ks, 0]
      key:
        column_net: C0
        row_net: R3
        rotate: -15
      columns:
        out:
      rows:
        mid:

    # ---- Thumb cluster: 2 keys on their own strip / serpentine tail off the
    # root. Curved 2-key (per the brief). column_net C2/C3, row R3. Anchor +
    # splay are a STARTING POINT — set the real angle from the Cosmos thumb
    # transforms (cad/stactyl-cosmos-expert.ts, leftThumbsPlane/rightThumbsPlane).
    thumb:
      # RIGHT-hand thumb. It sits below the INNER column and reaches OUTBOARD =
      # further LEFT (toward -x), NOT rightward toward the fingers (the bug).
      #   tucky (home): just outboard of the inner column
      #   reachy (far): well past any finger key, lower-left of tucky
      # Placed explicitly off finger_inner_bottom (spread: 0 + per-key shift).
      # Tilts match the Cosmos z-rotations (~ -10 / -17). If the tilt direction
      # looks wrong now that the POSITIONS are right, just flip both rotate signs.
      anchor:
        ref: finger_inner_bottom
      key:
        padding: ks + 1
        spread: 0
      columns:
        home:                        # tucky / home thumb
          key:
            column_net: C2
            row_net: R3
            shift: [-2, -ky - 4]     # ~ (-2, -24): just below-outboard of inner
            rotate: 10               # CCW: slopes down-and-away from the fingers (matches Cosmos)
        far:                         # reachy thumb
          key:
            column_net: C3
            row_net: R3
            shift: [-20, -ky - 10]   # ~ (-20, -30): well past the inner column, left + down
            rotate: 17
      rows:
        fan:

outlines:
  # ---------------------------------------------------------------------------
  # COMB OUTLINE with BK-style flex relief. The board is WIDE at each switch and
  # PINCHED between switches (so a column can bend), and the inter-column bridges
  # sit in the pinched zones where the gap is wide (~12mm) so they have length to
  # flex. Built from: wide key pads + a narrow per-column spine + long necks.
  # Tune the *_w / *_h / neck_* / spine_w units above. (Claude can't render — so
  # render output/outlines/board.svg and we iterate.)
  # ---------------------------------------------------------------------------

  # Wide key-pad at EVERY switch (fingers + thumb + outboard, each at its own
  # rotation). `where: true` = all points; this also supplies the thumb and
  # outboard pads, so they don't need separate definitions.
  _pads:
    - what: rectangle
      where: true
      size: [strip_w, pad_h]
      corner: 1.5

  # Narrow backbone per finger column (home-anchored, exact names), tall enough
  # to span all 3 keys. BETWEEN keys only this spine remains -> the column
  # pinches there and can flex. The wide pads sit on top at each key.
  _col_spines:
    - what: rectangle
      where: "finger_inner_home"
      size: [spine_w, strip_h]
    - what: rectangle
      where: "finger_index_home"
      size: [spine_w, strip_h]
      operation: add
    - what: rectangle
      where: "finger_middle_home"
      size: [spine_w, strip_h]
      operation: add
    - what: rectangle
      where: "finger_ring_home"
      size: [spine_w, strip_h]
      operation: add
    - what: rectangle
      where: "finger_pinky_home"
      size: [spine_w, strip_h]
      operation: add

  # Inter-column necks: bridge adjacent column SPINES in the PINCHED zones
  # (between keys), where the spine-to-spine gap is ~12mm -> long, flexible necks
  # (the old ones spanned 1.5mm and were rigid). Alternating up/down. neck_w is
  # tall to bridge the column stagger step; nudge the shift y to sit each neck in
  # the relief gap of its two columns.
  _col_necks:
    - what: rectangle
      where: "finger_inner_home"
      adjust: {shift: [8.5, 8.5]}     # inner <-> index, UPPER relief (between home & top)
      size: [neck_l, neck_w]
      corner: 1
    - what: rectangle
      where: "finger_index_home"
      adjust: {shift: [8.5, -8.5]}    # index <-> middle, LOWER relief (between bottom & home)
      size: [neck_l, neck_w]
      corner: 1
      operation: add
    - what: rectangle
      where: "finger_middle_home"
      adjust: {shift: [8.5, 8.5]}     # middle <-> ring, UPPER
      size: [neck_l, neck_w]
      corner: 1
      operation: add
    - what: rectangle
      where: "finger_ring_home"
      adjust: {shift: [8.5, -8.5]}    # ring <-> pinky, LOWER
      size: [neck_l, neck_w]
      corner: 1
      operation: add

  # Outboard pinky neck (pinky spine -> outboard pad).
  _outboard_neck:
    - what: rectangle
      where: "finger_pinky_home"
      adjust: {shift: [9, 0]}
      size: [neck_l, neck_w]
      corner: 1

  # Thumb neck (inner column -> thumb cluster).
  _thumb_neck:
    - what: rectangle
      where: "finger_inner_bottom"
      adjust: {shift: [-1, -11]}      # inner column <-> thumb (tune)
      size: [10, 20]
      corner: 1

  # Rigid controller ROOT (regular XIAO BLE + power + battery + LED MOSFET). PLACEHOLDER position,
  # shown floating below the cluster — move it where it'll fold under the
  # keywell, then connect it to the inner column + thumb with a spine/neck.
  _root:
    - what: rectangle
      where: "finger_middle_home"
      adjust: {shift: [0, -66]}
      size: [95, 24]
      corner: 2

  # Exported board = union of everything (this becomes Edge.Cuts).
  board:
    - what: outline
      name: _pads
    - what: outline
      name: _col_spines
      operation: add
    - what: outline
      name: _col_necks
      operation: add
    - what: outline
      name: _outboard_neck
      operation: add
    - what: outline
      name: _thumb_neck
      operation: add
    - what: outline
      name: _root
      operation: add

# =============================================================================
# PCB — scaffold (footprints; wire in ergogen on Hunter's machine).
# Model on ../LightFury/config.yaml. Needs:
#   - key_switches: what=switch_pg1316s, from={{column_net}} to={{colrow}}.
#   - diodes: diode_smd_sod323f, one per key (SOD-323), tucked beside the switch.
#   - per_key_leds: SK6805-1515 / EC15 footprint (TO BUILD via kicad2ergogen;
#     pad order 1=DIN 2=VDD 3=DOUT 4=GND), placed in each switch's center cutout,
#     P_DIN/P_DOUT = {{key.led_prev}}/{{key.led_next}}, VDD=5V, GND.
#   - mcu: regular XIAO nRF52840 BLE on the rigid root (confirm the footprint from
#     ../ergogen-footprints xiao_ble_plus_breakout_holes / util_xiao_ble_plus_*).
#   - power_switch_smd_side, reset_switch_smd_side, battery connector on the root.
#
# RGB CHAIN ORDER (single serial line; assign led_prev/led_next in points to
# match once wiring): root DIN -> thumb_far -> thumb_home -> inner(bottom->home
# ->top) -> index(top->home->bottom) -> middle(bottom->home->top) -> ring(top->
# home->bottom) -> pinky(bottom->home->top) -> outboard_pinky -> (end).
# =============================================================================
